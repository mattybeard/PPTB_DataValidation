<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-labelledby="title desc">
  <title id="title">PPTB Data Validation Icon</title>
  <desc id="desc">A stacked data cylinder with a validation check badge.</desc>

  <defs>
    <linearGradient id="dbGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3B82F6"/>
      <stop offset="1" stop-color="#1D4ED8"/>
    </linearGradient>
    <linearGradient id="shineGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="1.4" flood-color="#0F172A" flood-opacity="0.25"/>
    </filter>
  </defs>

  <g filter="url(#shadow)">
    <ellipse cx="28" cy="16" rx="18" ry="8" fill="url(#dbGrad)"/>
    <path d="M10 16v10c0 4.5 8 8 18 8s18-3.5 18-8V16" fill="url(#dbGrad)"/>
    <ellipse cx="28" cy="26" rx="18" ry="8" fill="none" stroke="#93C5FD" stroke-opacity="0.55" stroke-width="1.2"/>

    <path d="M10 26v10c0 4.5 8 8 18 8s18-3.5 18-8V26" fill="url(#dbGrad)"/>
    <ellipse cx="28" cy="36" rx="18" ry="8" fill="none" stroke="#93C5FD" stroke-opacity="0.55" stroke-width="1.2"/>

    <path d="M10 36v10c0 4.5 8 8 18 8s18-3.5 18-8V36" fill="url(#dbGrad)"/>
    <ellipse cx="28" cy="46" rx="18" ry="8" fill="none" stroke="#BFDBFE" stroke-opacity="0.6" stroke-width="1.2"/>

    <ellipse cx="22" cy="13.5" rx="13" ry="5" fill="url(#shineGrad)"/>
  </g>

  <g filter="url(#shadow)">
    <circle cx="47" cy="44" r="13" fill="#10B981"/>
    <circle cx="47" cy="44" r="13" fill="none" stroke="#DCFCE7" stroke-opacity="0.75" stroke-width="1.4"/>
    <path d="M40.5 44.4l4.2 4.2 8.7-8.7" fill="none" stroke="#FFFFFF" stroke-width="3.3" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
